# =============================================================================
# RCS MQTT Broker + STUN/TURN relay — Docker Compose stack
# =============================================================================
#
# Two services:
#
#   1. mosquitto — Eclipse Mosquitto 2 with TLS 1.2+ on port 8883.
#      Bridge network is fine: the broker only needs a single TCP port exposed.
#
#   2. coturn    — STUN + TURN relay for WebRTC video NAT traversal.
#      IMPORTANT: network_mode: host is intentional and required. The TURN
#      relay allocates per-session UDP ports in the range 49152-65535 and
#      advertises the VPS external IP to peers. With bridge networking, those
#      relay ports would not be reachable (NAT hairpinning breaks) and the
#      WebRTC media path would fail. Host networking is the standard and
#      supported deployment mode for coturn in containers.
#
# Firewall is the operator's responsibility. The README documents the UFW
# rules that must be opened on the VPS (8883/tcp, 3478/udp+tcp, 49152-65535/udp).
#
# All runtime state (certs, passwd, ACLs, persistence, logs, turnserver.conf)
# lives under ./data/ and is populated by init.sh before the first "up".
# =============================================================================

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: rcs-mosquitto
    restart: unless-stopped
    ports:
      - "8883:8883"
    volumes:
      - ./data/mosquitto/config:/mosquitto/config:ro
      - ./data/mosquitto/data:/mosquitto/data
      - ./data/mosquitto/log:/mosquitto/log
      - ./data/certs:/mosquitto/certs:ro
    # Healthcheck: a TLS pub/sub round trip via the dedicated "health" user
    # subscribing to $SYS/broker/uptime. This verifies the full stack (TLS
    # listener, auth, ACL) — not just that the TCP socket is open. The
    # health user has its own random password (generated by init.sh into
    # .env) and a read-only ACL on $SYS/broker/uptime so a compromised
    # healthcheck cannot publish or read traffic topics. The eclipse-mosquitto
    # image ships mosquitto_sub in /usr/bin, so no extra install is needed.
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mosquitto_sub -h localhost -p 8883 --cafile /mosquitto/certs/ca.crt --insecure -u \"$$HEALTH_USER\" -P \"$$HEALTH_PASSWORD\" -t '$$SYS/broker/uptime' -C 1 -W 5 >/dev/null 2>&1 || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      # Propagated into the container so the healthcheck shell can use them.
      HEALTH_USER: ${HEALTH_USER:-health}
      HEALTH_PASSWORD: ${HEALTH_PASSWORD}

  coturn:
    image: coturn/coturn:latest
    container_name: rcs-coturn
    restart: unless-stopped
    # See the header comment: host networking is required for the TURN relay
    # port range (49152-65535/udp) and the external-ip advertisement to work.
    network_mode: host
    volumes:
      - ./data/coturn/turnserver.conf:/etc/turnserver.conf:ro
      - ./data/coturn/log:/var/log
    healthcheck:
      # turnserver binds BOTH TCP and UDP on the listening-port. We use the
      # TCP check because `nc -zu` for UDP is unreliable — UDP has no
      # handshake, so the test depends on an ICMP port-unreachable being
      # returned when the port is closed, which many firewalls drop. TCP
      # 3478 is the canonical liveness signal: if turnserver is alive, it's
      # bound there.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3478 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
